spring.application.name=backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/laptop_store?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# HIBERNATE: Tự động đẻ bảng vào Database mới (Giữ nguyên)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port (Giữ nguyên)
server.port=8080

# Security (Giữ nguyên)
#spring.security.user.name=admin
#spring.security.user.password=123456

# Swagger / Open API Configuration
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.operations-sorter=alpha

# JWT Configuration
jwt.secret=change-this-to-a-very-long-random-secret-key-for-dev-only-1234567890
jwt.expiration-ms=86400000

# Admin Configuration
app.admin.email=admin@gmail.com
app.admin.password=admin
app.admin.full-name=System Admin

# Pagination Configuration
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100