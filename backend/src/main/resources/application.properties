spring.application.name=backend

# ---------------------------------------------------------
# CẤU HÌNH MỚI: DÙNG MYSQL DATABASE (Đã đổi)
# ---------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/laptop_store?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Điền tài khoản root và mật khẩu MySQL của bạn vào đây
spring.datasource.username=root
spring.datasource.password=123456

# ---------------------------------------------------------
# HIBERNATE: Tự động đẻ bảng vào Database mới (Giữ nguyên)
# ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port (Giữ nguyên)
server.port=8080

# Security (Giữ nguyên)
spring.security.user.name=admin
spring.security.user.password=123456

# ---------------------------------------------------------
# SWAGGER / OPENAPI CONFIGURATION
# ---------------------------------------------------------
springdoc.swagger-ui.path=/api/docs
springdoc.swagger-ui.operations-sorter=alpha