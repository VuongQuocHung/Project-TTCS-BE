# Server configuration
server.port=${SERVER_PORT:8080}

# Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/laptop_shop?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI configuration
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs

# Custom properties
app.import.path=${APP_IMPORT_PATH:../laptop_data/final_gallery_data.json}
app.import.enabled=true
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# CORS configuration
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google OAuth2 Configuration
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# Frontend Redirect URI
app.oauth2.redirect-uri=${FRONTEND_URL:http://localhost:3000}/oauth2/redirect

# Logging
logging.level.org.springframework.security=DEBUG

# Admin Configuration
app.admin.email=${ADMIN_EMAIL:admin@laptopshop.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.full-name=${ADMIN_FULLNAME:Default Admin}