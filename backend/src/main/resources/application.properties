spring.application.name=backend

# SQL Server Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=laptop_store;encrypt=true;trustServerCertificate=true;
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=123456

# Hibernate ddl-auto (update for dev, validate for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8080

spring.security.user.name=admin
spring.security.user.password=123456

jwt.secret=change-this-to-a-very-long-random-secret-key-for-dev-only-1234567890
jwt.expiration-ms=86400000

app.admin.email=admin@laptopstore.local
app.admin.password=admin123
app.admin.full-name=System Admin
